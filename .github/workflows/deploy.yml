name: Deploy prod

on:
  push:
    tags:
      - '*'

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract tag version
        id: version
        run: |
          RAW_TAG="${GITHUB_REF_NAME}"
          CLEAN_TAG="${RAW_TAG#v}"
          echo "tag=$CLEAN_TAG" >> $GITHUB_OUTPUT

      - name: Print version
        run: |
          echo "Using release tag: ${{ steps.version.outputs.tag }}"

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set application.yml values
        uses: microsoft/variable-substitution@v1
        with:
          files: src/main/resources/application.yml
        env:
          spring.security.user.name: ${{ secrets.SECURITY_USER_NAME }}
          spring.security.user.password: ${{ secrets.SECURITY_USER_PASSWORD }}
          spring.datasource.url: ${{ secrets.DB_URL }}
          spring.datasource.username: ${{ secrets.DB_USERNAME }}
          spring.datasource.password: ${{ secrets.DB_PASSWORD }}
          application.jwt.secretKey: ${{ secrets.JWT_SECRET_KEY }}
          spring.mail.port: ${{ secrets.SMTP_PORT }}
          spring.mail.email_noreply: ${{ secrets.SMTP_EMAIL_NOREPLY }}
          spring.mail.password_noreply: ${{ secrets.SMTP_PASSWORD_NOREPLY }}
          spring.mail.email_recruit: ${{ secrets.SMTP_EMAIL_RECRUIT }}
          spring.mail.password_recruit: ${{ secrets.SMTP_PASSWORD_RECRUIT }}
          spring.data.redis.host: ${{ secrets.REDIS_HOST }}
          spring.data.redis.port: ${{ secrets.REDIS_PORT }}
          spring.data.redis.password: ${{ secrets.REDIS_PASSWORD }}
          slack.webhook-url: ${{ secrets.SLACK_WEBHOOK }}

      - name: Create GCP Service Account Key File
        run: |
          mkdir -p src/main/resources
          echo '${{ secrets.GCP_SERVICE_KEY }}' > src/main/resources/bigtablet-homepage-ffe77aff799f.json

      - name: chmod gradlew
        run: chmod +x ./gradlew

      - name: Build with Gradle
        id: gradle
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew --no-daemon --stacktrace bootJar 2>&1 | tee gradle.log

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: app-jar
          path: build/libs/*.jar
          retention-days: 1

  docker:
    runs-on: ubuntu-latest
    needs: build
    env:
      IMAGE: ${{ secrets.DOCKER_USERNAME }}/bigtablet-homepage-server

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: build/libs

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build & Push image with SBOM & provenance
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE }}:${{ needs.build.outputs.version }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.0.0

      - name: Sign image (keyless)
        run: |
          cosign sign --yes "$IMAGE@${{ steps.docker_build.outputs.digest }}"

  deploy:
    runs-on: ubuntu-latest
    needs: [build, docker]
    environment: production
    env:
      IMAGE: ${{ secrets.DOCKER_USERNAME }}/bigtablet-homepage-server

    steps:
      - name: Deploy to prod server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST_PROD }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.PRIVATE_KEY }}
          port: ${{ secrets.PORT }}
          envs: IMAGE
          script: |
            set -e
            VERSION=${{ needs.build.outputs.version }}
            docker pull $IMAGE:$VERSION
            docker rm -f bigtablet-homepage-server 2>/dev/null || true
            docker run -d --name bigtablet-homepage-server --restart unless-stopped --network host \
              -e SERVER_ADDRESS=127.0.0.1 \
              -e SERVER_PORT=8080 \
              $IMAGE:$VERSION
            docker image prune -af || true

  notify:
    runs-on: ubuntu-latest
    needs: [build, docker, deploy]
    if: always()

    steps:
      - name: Slack notify (success)
        if: needs.build.result == 'success' && needs.docker.result == 'success' && needs.deploy.result == 'success'
        env:
          GIT_SLACK_WEBHOOK_URL: ${{ secrets.GIT_SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "$(jq -n \
              --arg repo "${{ github.repository }}" \
              --arg tag "${{ needs.build.outputs.version }}" \
              --arg sha "${{ github.sha }}" \
              --arg actor "${{ github.actor }}" \
              --arg img "${{ secrets.DOCKER_USERNAME }}/bigtablet-homepage-server:${{ needs.build.outputs.version }}" \
              --arg url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              '{
                text: "✅ HOMEPAGE SERVER PROD 배포 성공",
                blocks: [
                  {
                    type: "section",
                    text: {
                      type: "mrkdwn",
                      text: "*✅ HOMEPAGE SERVER PROD 배포 성공*\n*Repo:* \($repo)\n*Tag:* \($tag)\n*SHA:* \($sha | .[0:7])\n*Actor:* \($actor)\n*Image:* \($img)\n*Run:* <\($url)|Open Actions Run>"
                    }
                  }
                ]
              }')" \
            "$GIT_SLACK_WEBHOOK_URL"

      - name: Slack notify (failure)
        if: needs.build.result == 'failure' || needs.docker.result == 'failure' || needs.deploy.result == 'failure'
        env:
          GIT_SLACK_WEBHOOK_URL: ${{ secrets.GIT_SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "$(jq -n \
              --arg repo "${{ github.repository }}" \
              --arg tag "${{ needs.build.outputs.version }}" \
              --arg sha "${{ github.sha }}" \
              --arg actor "${{ github.actor }}" \
              --arg url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              --arg build_result "${{ needs.build.result }}" \
              --arg docker_result "${{ needs.docker.result }}" \
              --arg deploy_result "${{ needs.deploy.result }}" \
              '{
                text: "❌ HOMEPAGE SERVER PROD 배포 실패",
                blocks: [
                  {
                    type: "section",
                    text: {
                      type: "mrkdwn",
                      text: ("*❌ HOMEPAGE SERVER PROD 배포 실패*\n"
                            + "*Repo:* \($repo)\n"
                            + "*Tag:* \($tag)\n"
                            + "*SHA:* \($sha[0:7])\n"
                            + "*Actor:* \($actor)\n"
                            + "*Run:* <\($url)|Open Actions Run>\n\n"
                            + "*Step results*\n"
                            + "• Build: `\($build_result)`\n"
                            + "• Docker: `\($docker_result)`\n"
                            + "• Deploy: `\($deploy_result)`")
                    }
                  }
                ]
              }')" \
            "$GIT_SLACK_WEBHOOK_URL"
